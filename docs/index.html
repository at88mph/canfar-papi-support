<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CANFAR &amp; SKAO Permissions API</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/moon.css"
    />
    <style>
      .title-slide h1 {
        font-size: 1.85em;
        line-height: 1.2;
        margin-bottom: 0.6em;
      }
      .title-slide .subtitle {
        font-size: 1.05em;
        opacity: 0.92;
        max-width: 38em;
        margin: 0 auto 2em;
        line-height: 1.45;
      }
      .title-slide .author {

        margin-top: 1.5em;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section class="title-slide">
          <h1>CANFAR Science Platform &amp; the SKAO Permissions API</h1>

            Configuring the CANFAR Science Platform to integrate with the SKAO
            Permissions API—aligning identity, authorization, and resource access

          <p class="author">Dustin Jenkins</p>
        </section>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        slideNumber: "c/t",
        transition: "fade",
        width: 1280,
        height: 720,
        margin: 0.08,
